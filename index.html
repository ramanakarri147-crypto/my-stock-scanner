<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ఆటోమేటిక్ స్టాక్ స్కానర్</title>
    <style>
        body { background-color: #0b0f19; color: #f1f5f9; font-family: sans-serif; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: 0 auto; background: #1e293b; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        h1 { color: #10b981; font-size: 1.5rem; }
        .update-time { color: #94a3b8; font-size: 0.85rem; margin-bottom: 20px; }
        .stock-card { background: #111827; border-left: 5px solid #facc15; padding: 15px; margin: 10px 0; text-align: left; border-radius: 6px; }
        .stock-name { font-weight: bold; font-size: 1.1rem; color: #38bdf8; display: flex; justify-content: space-between; }
        .badge { background: #34d399; color: black; padding: 2px 6px; font-size: 0.75rem; border-radius: 4px; }
        .details { font-size: 0.9rem; margin-top: 5px; color: #cbd5e1; }
        .green-text { color: #34d399; font-size: 0.8rem; font-weight: bold; margin-top: 4px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>నా 5-కండిషన్స్ ఆటోమేటిక్ స్కానర్ 🚀</h1>
        <div class="update-time" id="sync-time">లోడ్ అవుతోంది...</div>
        
        <div id="stocks-list">
            <!-- ఇక్కడ స్టాక్స్ ఆటోమేటిక్‌గా లోడ్ అవుతాయి -->
        </div>
    </div>

    <script>
        // GitHub లో అప్‌డేట్ అయ్యే data.json ఫైల్ నుండి డేటా తెచ్చుకుంటుంది
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('sync-time').innerText = "చివరిగా స్కాన్ చేసిన సమయం: " + data.last_updated + " (IST)";
                
                const listContainer = document.getElementById('stocks-list');
                listContainer.innerHTML = ""; // Clear loader
                
                if(data.stocks.length === 0) {
                    listContainer.innerHTML = "<p style='color:#ef4444;'>ఈరోజు నీ 5 రూల్స్ మ్యాచ్ అయిన స్టాక్స్ ఏవీ లేవు బ్రో!</p>";
                    return;
                }
                
                data.stocks.forEach(stock => {
                    const card = document.createElement('div');
                    card.className = 'stock-card';
                    card.innerHTML = `
                        <div class="stock-name">${stock.name} <span>₹${stock.price}</span></div>
                        <div class="details"><strong>సిగ్నల్:</strong> ${stock.news}</div>
                        <div class="green-text">✓ ${stock.ema_status}</div>
                        <div class="green-text" style="color:#facc15;">✓ ${stock.volume_status}</div>
                    `;
                    listContainer.appendChild(card);
                });
            })
            .catch(err => {
                document.getElementById('stocks-list').innerHTML = "<p>డేటా లోడ్ చేయడంలో లోపం జరిగింది.</p>";
            });
    </script>
</body>
</html>
